<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151c2b" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260712-25" />
    <title>Accounts</title>

  <body>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <header class="brand">
          <svg class="brand-logo" aria-hidden="true">
            <use href="#i-motech-development" />
          </svg>
          <span><strong>Accounts</strong></span>
          <button
            class="icon-button mobile-only"
            data-close-nav
            aria-label="Close navigation"
          >
            <svg><use href="#i-close" /></svg>
          </button>
        </header>
        <nav aria-label="Primary navigation">
          <button class="active" data-view="overview">
            <svg><use href="#i-overview" /></svg>Overview
          </button>
          <button data-view="transactions">
            <svg><use href="#i-wallet" /></svg>Transactions
          </button>
          <button data-view="clients">
            <svg><use href="#i-users" /></svg>Clients
          </button>
          <button data-view="reports">
            <svg><use href="#i-report" /></svg>Reports
          </button>
          <button data-view="company">
            <svg><use href="#i-building" /></svg>Company details
          </button>
          <button data-view="settings">
            <svg><use href="#i-settings" /></svg>Settings
          </button>
        </nav>
        <footer class="sidebar-footer">
          <div class="popover-anchor">
            <div
              class="sidebar-popover company-popover"
              id="company-menu"
              hidden
            >
              <h2 class="popover-heading">Switch company</h2>
              <button
                class="selected"
                data-action="select-company"
                aria-pressed="true"
              >
                <span class="company-initial">M</span
                ><span
                  ><strong>Motech Development</strong
                  ><small>08374621</small></span
                >
              </button>
              <button data-action="select-company" aria-pressed="false">
                <span class="company-initial alt">N</span
                ><span
                  ><strong>Northline Digital Ltd</strong
                  ><small>10294811</small></span
                >
              </button>
              <button class="popover-action" data-action="manage-companies">
                <svg><use href="#i-building" /></svg>Manage companies
              </button>
            </div>
            <button
              class="company-trigger"
              id="company-trigger"
              aria-expanded="false"
            >
              <span class="company-initial">M</span
              ><span
                ><small>Current company</small
                ><strong>Motech Development</strong></span
              >
            </button>
          </div>
          <div class="popover-anchor">
            <div
              class="sidebar-popover profile-popover"
              id="profile-menu"
              hidden
            >
              <div class="notification-heading">
                <h2>Notifications</h2>
                <span>1 new</span>
              </div>
              <button class="notification" data-action="view-reports">
                <svg><use href="#i-report" /></svg
                ><span
                  ><strong>Your report is ready</strong
                  ><small>Created 4 minutes ago</small></span
                >
              </button>
              <button class="sign-out" data-action="sign-out">
                <svg><use href="#i-signout" /></svg>Sign out
              </button>
            </div>
            <button
              class="profile-trigger"
              id="profile-trigger"
              aria-expanded="false"
            >
              <span class="avatar">MG<i></i></span><strong>Mo Gusbi</strong>
            </button>
          </div>
        </footer>
      </aside>
      <button
        class="nav-backdrop"
        data-close-nav
        aria-label="Close navigation"
        hidden
      ></button>
      <main class="workspace">
        <header class="mobile-header">
          <button
            class="icon-button"
            id="open-nav"
            aria-label="Open navigation"
          >
            <svg><use href="#i-menu" /></svg>
          </button>
          <strong>Accounts</strong>
          <button
            class="icon-button mobile-profile-trigger"
            id="mobile-profile-trigger"
            aria-expanded="false"
            aria-label="Account menu, 1 unread notification"
          >
            <span class="avatar" aria-hidden="true">MG<i></i></span>
          </button>
        </header>
        <div
          class="mobile-profile-menu"
          id="mobile-profile-menu"
          aria-label="Account menu"
          hidden
        >
          <div class="notification-heading">
            <h2>Notifications</h2>
            <span>1 new</span>
          </div>
          <button class="notification" data-action="view-reports">
            <svg><use href="#i-report" /></svg
            ><span
              ><strong>Your report is ready</strong
              ><small>Created 4 minutes ago</small></span
            >
          </button>
          <button class="sign-out" data-action="sign-out">
            <svg><use href="#i-signout" /></svg>Sign out
          </button>
        </div>
        <div class="workspace-inner" id="content"></div>
      </main>
    </div>
    <div id="drawer-root"></div>
    <div class="prototype-state-control" id="prototype-state-control">
      <section
        class="prototype-state-menu"
        id="prototype-state-menu"
        aria-labelledby="prototype-state-heading"
        data-state="closed"
        hidden
      >
        <header>
          <h2 id="prototype-state-heading">Preview state</h2>
          <p>Change the state of this screen.</p>
        </header>
        <div
          class="prototype-state-options"
          role="group"
          aria-label="Screen state"
        >
          <button data-preview-state="ready" aria-pressed="true" type="button">
            Ready
          </button>
          <button
            data-preview-state="loading"
            aria-pressed="false"
            type="button"
          >
            Loading
          </button>
          <button data-preview-state="empty" aria-pressed="false" type="button">
            Empty
          </button>
          <button data-preview-state="error" aria-pressed="false" type="button">
            Error
          </button>
        </div>
      </section>
      <button
        class="prototype-state-trigger"
        id="prototype-state-trigger"
        aria-controls="prototype-state-menu"
        aria-expanded="false"
        type="button"
      >
        <svg aria-hidden="true"><use href="#i-preview" /></svg>
        <span id="prototype-state-label" aria-live="polite"
          >Preview: Ready</span
        >
      </button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
