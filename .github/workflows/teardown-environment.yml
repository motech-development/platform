      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Start dependency setup measurement
        id: dependency-timing
        run: |
