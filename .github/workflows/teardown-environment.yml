    if: always() && github.actor != 'dependabot[bot]' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'skipped')

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-api

    env:
      AWS_DEFAULT_REGION: eu-west-1
      REPORTS_BUCKET: s3://accounts-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}-reports
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Start dependency setup measurement
        id: dependency-timing
        run: |
          : > "$RUNNER_TEMP/delivery-timing.md"
          echo "started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Resolve Node runtime
        id: runtime
        run: echo "version=$(node --version)" >> "$GITHUB_OUTPUT"

      - name: Restore installed dependencies
        id: installed-dependencies
        uses: actions/cache@v6
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
            ./.yarn/install-state.gz
          key: ${{ runner.os }}-${{ runner.arch }}-installed-dependencies-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/**', '.yarn/plugins/**', '.yarn/patches/**', 'package.json', 'applications/*/*/package.json', 'packages/*/package.json') }}

      - name: Restore Yarn archives
        id: yarn-archives
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.yarn/berry/cache
            ./.yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-

      - name: Install dependencies
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Record dependency setup timing
        if: always()
        env:
          ARCHIVE_CACHE_HIT: ${{ steps.yarn-archives.outputs.cache-hit }}
          INSTALLED_CACHE_HIT: ${{ steps.installed-dependencies.outputs.cache-hit }}
          STARTED_AT: ${{ steps.dependency-timing.outputs.started-at }}
        run: |
          if [[ "$INSTALLED_CACHE_HIT" == "true" ]]; then
            route="exact installed cache hit"
          elif [[ -n "$ARCHIVE_CACHE_HIT" ]]; then
            route="archive fallback"
          else
            route="cold install"
          fi
          elapsed_seconds=$(( $(date +%s) - STARTED_AT ))
          echo "| Dependency setup ($route) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Build required workspace packages
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@accounts/reports' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@accounts/reports) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Check for resources
        id: resources
        shell: bash
        run: |
          found=false
          for stack in "accounts-${STAGE}-reports"; do
            if output="$(aws cloudformation describe-stacks --stack-name "$stack" 2>&1)"; then
              found=true
            elif [[ "$output" != *"does not exist"* ]]; then
              echo "$output" >&2
              exit 1
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Clear bucket
        if: steps.resources.outputs.found == 'true'
        run: .github/delivery/empty-s3-bucket.sh "$REPORTS_BUCKET"

      - name: Teardown
        if: steps.resources.outputs.found == 'true'
        run: yarn workspace @accounts/reports teardown --stage $STAGE

      - name: Record delivery timing summary
        if: always()
        shell: bash
        run: |
          if [[ -s "$RUNNER_TEMP/delivery-timing.md" ]]; then
            {
              echo "| Measurement | Duration |"
              echo "| --- | ---: |"
              cat "$RUNNER_TEMP/delivery-timing.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
  # Accounts (API)
  accounts-api:
