            route="exact installed cache hit"
          elif [[ -n "$ARCHIVE_CACHE_HIT" ]]; then
            route="archive fallback"
          else
            route="cold install"
          fi
          elapsed_seconds=$(( $(date +%s) - STARTED_AT ))
          echo "| Dependency setup ($route) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Build required workspace packages
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@core/anti-virus' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@core/anti-virus) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Check for resources
        id: resources
        shell: bash
        run: |
          found=false
          for stack in "anti-virus-${STAGE}"; do
