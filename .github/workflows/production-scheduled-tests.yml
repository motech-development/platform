name: Production scheduled tests

on:
  schedule:
    - cron: '30 */12 * * *'

concurrency: production_environment

jobs:
  setup:
    name: Setup

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Restore cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cache-

  warm-up:
    name: Warm up

    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build required workspace packages
        run: yarn workspaces foreach -Rpt --from '@accounts/warm-up' run package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Warm up
        run: yarn workspace @accounts/warm-up start --stage $STAGE

  accounts-tests:
    name: Accounts tests

    runs-on: ubuntu-latest

    needs: warm-up

    strategy:
      fail-fast: false
      matrix:
        containers:
          - 1
          - 2

    env:
      BASE_URL: https://accounts.motechdevelopment.co.uk
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Restore cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn workspace @accounts/client playwright install --with-deps

      - name: Smoke tests
        run: yarn workspace @accounts/client e2e-ci --shard=${{ matrix.containers }}/2

  playwright-status:
    name: Set Playwright status

    runs-on: ubuntu-latest

    needs: accounts-tests

    if: always()

    steps:
      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Set commit status
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const status = '${{ needs.accounts-tests.result }}' === 'success' ? 'success' : 'failure';
            const description = '${{ needs.accounts-tests.result }}' === 'success' ? 'Playwright tests passed' : 'Playwright tests failed';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              context: 'Playwright',
              description: description
            });
