  # Accounts (API)
  accounts-api:
    name: Deploy accounts API

    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'accounts-api') && (!contains(fromJSON(needs.setup.outputs.units || '[]'), 'accounts-data') || needs.accounts-data.result == 'success') && (!contains(fromJSON(needs.setup.outputs.units || '[]'), 'accounts-queue') || needs.accounts-queue.result == 'success') && (!contains(fromJSON(needs.setup.outputs.units || '[]'), 'accounts-reports') || needs.accounts-reports.result == 'success') && (!contains(fromJSON(needs.setup.outputs.units || '[]'), 'accounts-storage') || needs.accounts-storage.result == 'success')

    runs-on: ubuntu-latest

    outputs:
      appsync-url: ${{ steps.client-config.outputs.appsync-url }}
      aws-region: ${{ steps.client-config.outputs.aws-region }}

    needs:
      - setup
      - accounts-data
      - accounts-queue
      - accounts-reports
      - accounts-storage

    env:
      DEPLOYMENT_ENVIRONMENT: develop
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@accounts/api'] }}
      DEPLOYMENT_TASK: deploy:accounts-api
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_DEV }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: develop
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      deployments: write
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(inputs.release-plan).desiredTags['@accounts/api'] }}

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build required workspace packages
        shell: bash
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@accounts/api' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@accounts/api) | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg ref "$DEPLOYMENT_REF" \
              --arg environment "$DEPLOYMENT_ENVIRONMENT" \
              --arg task "$DEPLOYMENT_TASK" \
              '{
                ref: $ref,
                environment: $environment,
                task: $task,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Create in-progress Deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state in_progress \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Deploy
        run: yarn workspace @accounts/api deploy --stage $STAGE

      - name: Export client configuration
        id: client-config
        shell: bash
        run: |
          started_at="$(date +%s)"
          appsync_url="$(
            aws cloudformation describe-stacks \
              --stack-name "accounts-${STAGE}-api" \
              --query "Stacks[0].Outputs[?OutputKey=='AccountsApiUrl'].OutputValue | [0]" \
              --output text
          )"
          aws_region="${AWS_REGION:-${AWS_DEFAULT_REGION:-}}"
          if [[ -z "$appsync_url" || "$appsync_url" == "None" || -z "$aws_region" ]]; then
            echo "Accounts client configuration is unavailable." >&2
            exit 1
          fi
          echo "appsync-url=$appsync_url" >> "$GITHUB_OUTPUT"
          echo "aws-region=$aws_region" >> "$GITHUB_OUTPUT"
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Client configuration transfer | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Record Deployment result
        if: always() && steps.deployment.outputs.id != ''
        env:
          DEPLOYMENT_STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state "$DEPLOYMENT_STATE" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -
