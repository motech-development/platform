  # Anti virus
  anti-virus:
    name: Deploy anti virus

    runs-on: ubuntu-latest

    needs: setup

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: develop

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set Node version
        uses: actions/setup-node@v4.2.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore packages
        uses: actions/cache@v4.2.2
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Restore application cache
        uses: actions/cache@v4.2.2
        with:
          path: |
            ./applications/core/anti-virus/node_modules/.cache
            ./applications/core/anti-virus/.serverless
          key: ${{ runner.os }}-core-anti-virus-v4-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-core-anti-virus-v4-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        uses: nick-fields/retry@v3.0.2
        env:
          npm_config_frozen_lockfile: false
        with:
          command: pnpm --filter @core/anti-virus run deploy -- --stage "$STAGE"
          max_attempts: 3
          on_retry_command: pnpm --filter @core/anti-virus run clean
          retry_on: error
          timeout_minutes: 15

      - name: Update definitions
        run: pnpm --filter @core/anti-virus run update-definitions -- --stage "$STAGE"
        env:
          npm_config_frozen_lockfile: false

