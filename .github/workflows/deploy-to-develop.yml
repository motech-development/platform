name: Deploy to develop

on:
  push:
    branches:
      - main

concurrency: development_environment

jobs:
  setup:
    name: Setup

    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set Node version
        uses: actions/setup-node@v4.2.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore packages
        id: packages
        uses: actions/cache@v4.2.2
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Restore cache
        id: cache
        uses: actions/cache@v4.2.2
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        if: steps.packages.outputs.cache-hit != 'true'
        run: pnpm package

      - name: Lint code
        run: pnpm lint

