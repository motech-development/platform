  # Anti virus
  core-anti-virus:
    name: Deploy anti virus

    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'core-anti-virus')

    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      DEPLOYMENT_ENVIRONMENT: develop
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}
      DEPLOYMENT_TASK: deploy:core-anti-virus
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: develop
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      deployments: write
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build required workspace packages
        shell: bash
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@core/anti-virus' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@core/anti-virus) | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Restore ClamAV binaries
        uses: actions/cache@v5
        with:
          path: ./applications/core/anti-virus/bin
          key: ${{ runner.os }}-${{ runner.arch }}-clamav-binaries-v1-${{ hashFiles('applications/core/anti-virus/scripts/build.sh') }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg ref "$DEPLOYMENT_REF" \
              --arg environment "$DEPLOYMENT_ENVIRONMENT" \
              --arg task "$DEPLOYMENT_TASK" \
              '{
                ref: $ref,
                environment: $environment,
                task: $task,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Create in-progress Deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state in_progress \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          command: yarn workspace @core/anti-virus deploy --stage $STAGE
          max_attempts: 3
          on_retry_command: yarn workspace @core/anti-virus clean
          retry_on: error
          timeout_minutes: 15

      - name: Update definitions
        run: yarn workspace @core/anti-virus update-definitions --stage $STAGE

      - name: Record Deployment result
        if: always() && steps.deployment.outputs.id != ''
        env:
          DEPLOYMENT_STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state "$DEPLOYMENT_STATE" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

