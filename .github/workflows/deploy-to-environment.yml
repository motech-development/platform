        run: exit 1

      - name: No Preview deployment required
        if: needs.setup.result == 'success' && needs.setup.outputs.units == '[]'
        run: echo 'No Preview Environment mutation is required.' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Preview Plan
        if: needs.setup.result == 'success'
        env:
          NEEDS: ${{ toJSON(needs) }}
          UNITS: ${{ needs.setup.outputs.units }}
        run: |
          jq -n -e \
            --argjson needs "$NEEDS" \
            --argjson units "$UNITS" \
            '$units | map(select($needs[.] != null)) | all(. as $unit | $needs[$unit].result == "success")'

  # Accounts (client)
  accounts-client:
    name: Test accounts client

    runs-on: ubuntu-latest

    timeout-minutes: 60

    needs:
      - accounts-api
      - setup
      - preview-status

    if: always() && needs.setup.outputs.validation-required == 'true' && needs.preview-status.result == 'success'

    strategy:
      fail-fast: false
      matrix:
        containers:
          - 1
          - 2

    env:
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      REACT_APP_AUTH0_AUDIENCE: ${{ secrets.ACCOUNTS_APP_AUDIENCE }}
      REACT_APP_AUTH0_CLIENT_ID: ${{ secrets.ACCOUNTS_APP_CLIENT_ID_DEV }}
      REACT_APP_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_DEV }}
      REACT_APP_GA: ${{ secrets.GA_ACCOUNTS_DEV }}
      REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_CLIENT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      STAGE: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Start dependency setup measurement
        id: dependency-timing
        run: |
          : > "$RUNNER_TEMP/delivery-timing.md"
          echo "started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Resolve Node runtime
        id: runtime
        run: echo "version=$(node --version)" >> "$GITHUB_OUTPUT"

      - name: Restore installed dependencies
        id: installed-dependencies
        uses: actions/cache@v6
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
            ./.yarn/install-state.gz
          key: ${{ runner.os }}-${{ runner.arch }}-installed-dependencies-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/**', '.yarn/plugins/**', '.yarn/patches/**', 'package.json', 'applications/*/*/package.json', 'packages/*/package.json') }}

      - name: Restore Yarn archives
        id: yarn-archives
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.yarn/berry/cache
            ./.yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-

      - name: Install dependencies
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Record dependency setup timing
        if: always()
        env:
          ARCHIVE_CACHE_HIT: ${{ steps.yarn-archives.outputs.cache-hit }}
          INSTALLED_CACHE_HIT: ${{ steps.installed-dependencies.outputs.cache-hit }}
          STARTED_AT: ${{ steps.dependency-timing.outputs.started-at }}
        run: |
          if [[ "$INSTALLED_CACHE_HIT" == "true" ]]; then
            route="exact installed cache hit"
          elif [[ -n "$ARCHIVE_CACHE_HIT" ]]; then
            route="archive fallback"
          else
            route="cold install"
          fi
          elapsed_seconds=$(( $(date +%s) - STARTED_AT ))
          echo "| Dependency setup ($route) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Build required workspace packages
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@accounts/client' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@accounts/client) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Restore cache
        id: cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn workspace @accounts/client playwright install --with-deps

      - name: Write client configuration
        env:
          REACT_APP_APPSYNC_URL: ${{ needs.accounts-api.outputs.appsync-url || needs.setup.outputs.api-appsync-url }}
          REACT_APP_AWS_REGION: ${{ needs.accounts-api.outputs.aws-region || needs.setup.outputs.api-aws-region }}
        run: |
          printf 'REACT_APP_APPSYNC_URL="%s"\n' "$REACT_APP_APPSYNC_URL" > ./applications/accounts/client/.env.production
          printf 'REACT_APP_AWS_REGION="%s"\n' "$REACT_APP_AWS_REGION" >> ./applications/accounts/client/.env.production

      - name: Build client
        run: yarn workspace @accounts/client build

      - name: Smoke tests
        run: yarn workspace @accounts/client e2e-ci --shard=${{ matrix.containers }}/2

      - name: Record delivery timing summary
        if: always()
        shell: bash
        run: |
          if [[ -s "$RUNNER_TEMP/delivery-timing.md" ]]; then
            {
              echo "| Measurement | Duration |"
              echo "| --- | ---: |"
              cat "$RUNNER_TEMP/delivery-timing.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Playwright status
  playwright-status:
    name: Set Playwright status

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-client

    if: always()

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Create Preview Validation Deployment
        id: validation-deployment
        if: needs.setup.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg environment "pr-${{ github.event.pull_request.number }}" \
              --arg ref "${{ github.event.pull_request.head.sha }}" \
              '{
                environment: $environment,
                task: "validate:playwright",
                ref: $ref,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/deployments" \
                --input - \
                --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Record Preview Validation result
        if: always() && steps.validation-deployment.outputs.id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_STATE: ${{ (needs.setup.outputs.validation-required != 'true' || needs.accounts-client.result == 'success') && 'success' || 'failure' }}
        shell: bash
        run: |
          jq -n \
            --arg state "$VALIDATION_STATE" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.validation-deployment.outputs.id }}/statuses" \
              --input -

      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Set commit status
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const planningSucceeded = '${{ needs.setup.result }}' === 'success';
            const validationRequired = '${{ needs.setup.outputs.validation-required }}' === 'true';
            const testsPassed = '${{ needs.accounts-client.result }}' === 'success';
            const validationPassed = planningSucceeded && (!validationRequired || testsPassed);
            const status = validationPassed ? 'success' : 'failure';
            const description = !planningSucceeded
              ? 'Preview planning failed'
              : validationRequired
                ? (testsPassed ? 'Playwright tests passed' : 'Playwright tests failed')
                : 'Playwright is not applicable';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: status,
              context: 'Playwright',
              description: description
            });
