      - setup
      - accounts-client

    if: always()

    steps:
      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Set commit status
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const runtimeAffected = '${{ needs.setup.outputs.runtime-affected }}' === 'true';
            const testsPassed = '${{ needs.accounts-client.result }}' === 'success';
            const status = !runtimeAffected || testsPassed ? 'success' : 'failure';
            const description = runtimeAffected
              ? (testsPassed ? 'Playwright tests passed' : 'Playwright tests failed')
              : 'Playwright is not applicable';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: status,
              context: 'Playwright',
              description: description
            });
