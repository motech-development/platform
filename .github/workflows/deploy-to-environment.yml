  # Anti virus
  core-anti-virus:
    name: Deploy anti virus

    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'core-anti-virus') && needs.setup.result == 'success'

    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      AWS_DEFAULT_REGION: eu-west-1
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: pr-${{ github.event.pull_request.number }}
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Start dependency setup measurement
        id: dependency-timing
        run: echo "started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Resolve Node runtime
        id: runtime
        run: echo "version=$(node --version)" >> "$GITHUB_OUTPUT"

      - name: Restore installed dependencies
        id: installed-dependencies
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
            ./.yarn/install-state.gz
          key: ${{ runner.os }}-${{ runner.arch }}-installed-dependencies-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/**', '.yarn/plugins/**', '.yarn/patches/**', 'package.json', 'applications/*/*/package.json', 'packages/*/package.json') }}

      - name: Restore Yarn archives
        id: yarn-archives
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry/cache
            ./.yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-

      - name: Install dependencies
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Record dependency setup timing
        if: always()
        env:
          ARCHIVE_CACHE_HIT: ${{ steps.yarn-archives.outputs.cache-hit }}
          INSTALLED_CACHE_HIT: ${{ steps.installed-dependencies.outputs.cache-hit }}
          STARTED_AT: ${{ steps.dependency-timing.outputs.started-at }}
        run: |
          if [[ "$INSTALLED_CACHE_HIT" == "true" ]]; then
            route="exact installed cache hit"
          elif [[ -n "$ARCHIVE_CACHE_HIT" ]]; then
            route="archive fallback"
          else
            route="cold install"
          fi
          elapsed_seconds=$(( $(date +%s) - STARTED_AT ))
          echo "| Dependency setup ($route) | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build required workspace packages
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@core/anti-virus' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@core/anti-virus) | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Start ClamAV timing
        id: clamav-timing
        run: echo "cache-started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check ClamAV binary cache compatibility
        id: clamav-cache
        shell: bash
        run: |
          if [[ -f applications/core/anti-virus/build-inputs.env && -x applications/core/anti-virus/scripts/cache.sh ]]; then
            supported=true
          else
            supported=false
          fi
          echo "supported=$supported" >> "$GITHUB_OUTPUT"

      - name: Restore ClamAV binaries
        id: clamav-binaries
        if: steps.clamav-cache.outputs.supported == 'true'
        uses: actions/cache@v5
        with:
          path: ./applications/core/anti-virus/bin
          key: ${{ runner.os }}-${{ runner.arch }}-clamav-binaries-v2-${{ hashFiles('applications/core/anti-virus/build-inputs.env', 'applications/core/anti-virus/scripts/build.sh', 'applications/core/anti-virus/scripts/cache.sh') }}

      - name: Validate restored ClamAV binaries
        id: clamav-validation
        if: steps.clamav-cache.outputs.supported == 'true'
        env:
          CACHE_HIT: ${{ steps.clamav-binaries.outputs.cache-hit }}
          CACHE_STARTED_AT: ${{ steps.clamav-timing.outputs.cache-started-at }}
        run: |
          validation_started_at="$(date +%s)"
          restore_elapsed=$(( validation_started_at - CACHE_STARTED_AT ))
          if [[ "$CACHE_HIT" != "true" ]]; then
            cache_state="miss"
            valid=false
          elif applications/core/anti-virus/scripts/cache.sh validate; then
            cache_state="hit"
            valid=true
          else
            cache_state="invalid"
            valid=false
            rm -rf applications/core/anti-virus/bin
          fi
          validation_elapsed=$(( $(date +%s) - validation_started_at ))
          echo "valid=$valid" >> "$GITHUB_OUTPUT"
          echo "| ClamAV cache restore | ${restore_elapsed}s ($cache_state) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ClamAV cache validation | ${validation_elapsed}s ($cache_state) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build ClamAV binaries
        env:
          CACHE_VALID: ${{ steps.clamav-validation.outputs.valid }}
        run: |
          started_at="$(date +%s)"
          yarn workspace @core/anti-virus predeploy
          elapsed_seconds=$(( $(date +%s) - started_at ))
          if [[ "$CACHE_VALID" == "true" ]]; then
            route="cache hit"
          else
            route="source build"
          fi
          echo "| ClamAV source build ($route) | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Package anti-virus
        run: |
          started_at="$(date +%s)"
          yarn workspace @core/anti-virus exec serverless package --stage $STAGE --package "$RUNNER_TEMP/anti-virus-package"
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Anti-virus packaging | ${elapsed_seconds}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          command: yarn workspace @core/anti-virus exec serverless deploy --stage $STAGE --package "$RUNNER_TEMP/anti-virus-package"
          max_attempts: 3
          retry_on: error
          timeout_minutes: 15

      - name: Check for definitions
        id: definitions
        continue-on-error: true
        run: aws s3api head-object --bucket anti-virus-${STAGE}-definitions --key daily.cvd

      - name: Update definitions
        if: steps.definitions.outcome != 'success'
        run: yarn workspace @core/anti-virus update-definitions --stage $STAGE

