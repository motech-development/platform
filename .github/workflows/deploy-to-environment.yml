        if: needs.setup.result == 'skipped' || needs.setup.outputs.runtime-affected == 'false'
        run: echo 'Preview deployment is not applicable for this pull request event.' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Preview Plan
        if: needs.setup.outputs.runtime-affected == 'true'
        env:
          NEEDS: ${{ toJSON(needs) }}
          UNITS: ${{ needs.setup.outputs.units }}
        run: |
          jq -n -e \
            --argjson needs "$NEEDS" \
            --argjson units "$UNITS" \
            '$units | map(select($needs[.] != null)) | all(. as $unit | $needs[$unit].result == "success")'

