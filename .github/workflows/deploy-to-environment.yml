# GENERATED FILE — DO NOT EDIT. Run `node .github/delivery/generate.mjs`.
name: Deploy to environment

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  setup:
    name: Preview plan

    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    outputs:
      api-appsync-url: ${{ steps.current-api-config.outputs.appsync-url }}
      api-aws-region: ${{ steps.current-api-config.outputs.aws-region }}
      runtime-affected: ${{ steps.plan.outputs.runtime-affected }}
      units: ${{ steps.plan.outputs.units }}
      validation-required: ${{ steps.plan.outputs.validation-required }}

    permissions:
      contents: read
      deployments: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Detect runtime changes
        id: impact
        shell: bash
        run: |
          git diff --name-only '${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}' > "$RUNNER_TEMP/changed-files.txt"
          impact="$(node .github/delivery/generate.mjs --preview-impact "$RUNNER_TEMP/changed-files.txt")"
          echo "runtime-affected=$(jq -r '.runtimeAffected' <<< "$impact")" >> "$GITHUB_OUTPUT"
          echo "changed-workspaces=$(jq -c '.changedWorkspaces' <<< "$impact")" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: github.event.action == 'synchronize'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Read Preview Environment stacks
        if: github.event.action == 'synchronize'
        run: |
          aws cloudformation describe-stacks --query 'Stacks[].StackName' --output json > "$RUNNER_TEMP/existing-stacks.json"

      - name: Read GitHub Deployments as Preview State
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          : > "$RUNNER_TEMP/deployments.jsonl"
          while IFS= read -r task; do
            while IFS= read -r encoded_deployment; do
              deployment="$(printf '%s' "$encoded_deployment" | base64 --decode)"
              deployment_id="$(jq -r .id <<< "$deployment")"
              statuses="$(
                gh api \
                  "repos/${GITHUB_REPOSITORY}/deployments/$deployment_id/statuses?per_page=100" \
                  --jq '[.[] | {state}]'
              )"
              jq -c \
                --argjson statuses "$statuses" \
                '. + {statuses: $statuses} | {environment, task, ref, statuses}' \
                <<< "$deployment" \
                >> "$RUNNER_TEMP/deployments.jsonl"
            done < <(
              gh api -X GET "repos/${GITHUB_REPOSITORY}/deployments" \
                -f environment="pr-${{ github.event.pull_request.number }}" \
                -f task="$task" \
                -f per_page=1 \
                --jq '.[] | {id, environment, task, ref} | @base64'
            )
          done < <(
            while IFS= read -r unit_id; do
              printf 'deploy:%s\n' "$unit_id"
            done < <(
              jq -r \
                '.units[] | select(.targets | index("preview")) | .id' \
                .github/delivery/catalog.json
            )
            printf 'validate:playwright\n'
          )
          jq -s '.' "$RUNNER_TEMP/deployments.jsonl" \
            > "$RUNNER_TEMP/deployments.json"

      - name: Read changes from recorded Preview State
        if: github.event.action == 'synchronize'
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          history='{}'
          while IFS= read -r ref; do
            if [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]] && ! git cat-file -e "${ref}^{commit}"; then
              git fetch --no-tags origin "$ref"
            fi
            if [[ ! "$ref" =~ ^[0-9a-fA-F]{40}$ ]] || ! git cat-file -e "${ref}^{commit}"; then
              echo "Preview State ref '$ref' is not a readable commit." >&2
              exit 1
            fi

            set +e
            git merge-base --is-ancestor "$ref" "$HEAD_SHA"
            relation_status=$?
            set -e
            case "$relation_status" in
              0)
                git diff --name-only "$ref..$HEAD_SHA" \
                  > "$RUNNER_TEMP/changed-files-from-state.txt"
                state_impact="$(
                  node .github/delivery/generate.mjs \
                    --preview-impact "$RUNNER_TEMP/changed-files-from-state.txt"
                )"
                state_history="$(jq -c '. + {related: true}' <<< "$state_impact")"
                ;;
              1)
                state_history='{"related":false,"runtimeAffected":true,"changedWorkspaces":[]}'
                ;;
              *)
                echo "Unable to compare Preview State ref '$ref' with '$HEAD_SHA'." >&2
                exit 1
                ;;
            esac
            history="$(
              jq -c \
                --arg ref "$ref" \
                --argjson stateHistory "$state_history" \
                '. + {($ref): $stateHistory}' \
                <<< "$history"
            )"
          done < <(
            jq -r \
              '.[] | select(.statuses[0].state == "success") | select(.task == "validate:playwright" or any(.statuses[]; .state == "in_progress")) | .ref | select(type == "string" and length > 0)' \
              "$RUNNER_TEMP/deployments.json" \
              | sort -u
          )
          printf '%s\n' "$history" > "$RUNNER_TEMP/preview-history.json"

      - name: Create Preview Plan
        id: plan
        env:
          CHANGED_WORKSPACES: ${{ steps.impact.outputs.changed-workspaces }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LIFECYCLE: ${{ github.event.action }}
          RUNTIME_AFFECTED: ${{ steps.impact.outputs.runtime-affected }}
          STAGE: pr-${{ github.event.pull_request.number }}
        shell: bash
        run: |
          deployments='[]'
          existing_stacks='[]'
          history='{}'
          if [[ -f "$RUNNER_TEMP/deployments.json" ]]; then
            deployments="$(cat "$RUNNER_TEMP/deployments.json")"
          fi
          if [[ -f "$RUNNER_TEMP/existing-stacks.json" ]]; then
            existing_stacks="$(cat "$RUNNER_TEMP/existing-stacks.json")"
          fi
          if [[ -f "$RUNNER_TEMP/preview-history.json" ]]; then
            history="$(cat "$RUNNER_TEMP/preview-history.json")"
          fi

          jq -n \
            --arg environment "$STAGE" \
            --arg head "$HEAD_SHA" \
            --arg lifecycle "$LIFECYCLE" \
            --arg stage "$STAGE" \
            --argjson runtimeAffected "$RUNTIME_AFFECTED" \
            --argjson changedWorkspaces "$CHANGED_WORKSPACES" \
            --argjson deployments "$deployments" \
            --argjson existingStacks "$existing_stacks" \
            --argjson history "$history" \
            '{environment: $environment, head: $head, lifecycle: $lifecycle, stage: $stage, runtimeAffected: $runtimeAffected, changedWorkspaces: $changedWorkspaces, deployments: $deployments, existingStacks: $existingStacks, history: $history}' \
            > "$RUNNER_TEMP/preview-plan-input.json"

          plan="$(node .github/delivery/generate.mjs --preview-plan "$RUNNER_TEMP/preview-plan-input.json")"
          echo "runtime-affected=$RUNTIME_AFFECTED" >> "$GITHUB_OUTPUT"
          echo "units=$(jq -c '.units' <<< "$plan")" >> "$GITHUB_OUTPUT"
          echo "validation-required=$(jq -r '.validationRequired' <<< "$plan")" >> "$GITHUB_OUTPUT"
          echo "### Preview Plan" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$plan" | jq . >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Read current Accounts API configuration
        id: current-api-config
        if: steps.plan.outputs.validation-required == 'true' && !contains(fromJSON(steps.plan.outputs.units), 'accounts-api')
        env:
          STAGE: pr-${{ github.event.pull_request.number }}
        shell: bash
        run: |
          stack="$(
            aws cloudformation describe-stacks \
              --stack-name "accounts-${STAGE}-api" \
              --query 'Stacks[0]' \
              --output json
          )"
          appsync_url="$(jq -r '.Outputs[] | select(.OutputKey == "AccountsApiUrl") | .OutputValue' <<< "$stack")"
          aws_region="$(jq -r '.StackId | split(":")[3]' <<< "$stack")"
          if [[ -z "$appsync_url" || "$appsync_url" == "null" || -z "$aws_region" || "$aws_region" == "null" ]]; then
            echo "Accounts client configuration is unavailable." >&2
            exit 1
          fi
          echo "appsync-url=$appsync_url" >> "$GITHUB_OUTPUT"
          echo "aws-region=$aws_region" >> "$GITHUB_OUTPUT"

