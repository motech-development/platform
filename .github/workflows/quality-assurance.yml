name: Quality assurance

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  label:
    name: Label PR

    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  delivery-catalog:
    name: Validate delivery catalog

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Test planner and generator
        run: node --test .github/delivery/*.test.mjs

      - name: Check generated workflows
        run: node .github/delivery/generate.mjs --check

  formatting:
    name: Formatting

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Check formatting
        run: yarn formatting

  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build packages
        run: yarn package

      - name: Lint code
        run: yarn lint

  type-check:
    name: Type check

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build packages
        run: yarn package

      - name: Type check
        run: yarn typecheck

  unit-tests:
    name: Unit tests

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Build packages
        run: yarn package

      - name: Restore cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Install Playwright browsers
        run: yarn workspace @motech-development/breeze-ui playwright install --with-deps chromium

      - name: Unit test
        run: yarn workspaces foreach -Wp -j 3 run test-ci

      - name: Fix paths for SonarCloud Scan
        run: ./scripts/sonar-scanner-path-fix.sh

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  chromatic:
    name: Chromatic

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      # Pinned to major version for stability while receiving patch updates
      - name: Run Chromatic
        uses: chromaui/action@v16
        with:
          workingDir: packages/breeze-ui
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: deploy
          exitOnceUploaded: true
