  core-anti-virus:
    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'core-anti-virus')
    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      DEPLOYMENT_ENVIRONMENT: production
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}
      DEPLOYMENT_TASK: deploy:core-anti-virus
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      deployments: write
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore Node modules
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
          key: ${{ runner.os }}-modules-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Restore packages
        uses: actions/cache@v5
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Restore application cache
        uses: actions/cache@v5
        with:
          path: |
            ./applications/core/anti-virus/node_modules/.cache
          key: ${{ runner.os }}-core-anti-virus-v4-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-core-anti-virus-v4-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg ref "$DEPLOYMENT_REF" \
              --arg environment "$DEPLOYMENT_ENVIRONMENT" \
              --arg task "$DEPLOYMENT_TASK" \
              '{
                ref: $ref,
                environment: $environment,
                task: $task,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Create in-progress Deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state in_progress \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          command: yarn workspace @core/anti-virus deploy --stage $STAGE
          max_attempts: 3
          on_retry_command: yarn workspace @core/anti-virus clean
          retry_on: error
          timeout_minutes: 15

      - name: Record Deployment result
        if: always() && steps.deployment.outputs.id != ''
        env:
          DEPLOYMENT_STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state "$DEPLOYMENT_STATE" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

