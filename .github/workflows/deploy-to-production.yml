  core-anti-virus:
    name: Deploy anti virus

    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'core-anti-virus')

    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      DEPLOYMENT_ENVIRONMENT: production
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}
      DEPLOYMENT_TASK: deploy:core-anti-virus
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      deployments: write
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(inputs.release-plan).desiredTags['@core/anti-virus'] }}

      - name: Start dependency setup measurement
        id: dependency-timing
        run: |
          : > "$RUNNER_TEMP/delivery-timing.md"
          echo "started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Resolve Node runtime
        id: runtime
        run: echo "version=$(node --version)" >> "$GITHUB_OUTPUT"

      - name: Restore installed dependencies
        id: installed-dependencies
        uses: actions/cache@v6
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
            ./.yarn/install-state.gz
          key: ${{ runner.os }}-${{ runner.arch }}-installed-dependencies-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/**', '.yarn/plugins/**', '.yarn/patches/**', 'package.json', 'applications/*/*/package.json', 'packages/*/package.json') }}

      - name: Restore Yarn archives
        id: yarn-archives
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.yarn/berry/cache
            ./.yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-archives-v1-node-${{ steps.runtime.outputs.version }}-${{ hashFiles('.nvmrc') }}-

      - name: Install dependencies
        if: steps.installed-dependencies.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Record dependency setup timing
        if: always()
        env:
          ARCHIVE_CACHE_HIT: ${{ steps.yarn-archives.outputs.cache-hit }}
          INSTALLED_CACHE_HIT: ${{ steps.installed-dependencies.outputs.cache-hit }}
          STARTED_AT: ${{ steps.dependency-timing.outputs.started-at }}
        run: |
          if [[ "$INSTALLED_CACHE_HIT" == "true" ]]; then
            route="exact installed cache hit"
          elif [[ -n "$ARCHIVE_CACHE_HIT" ]]; then
            route="archive fallback"
          else
            route="cold install"
          fi
          elapsed_seconds=$(( $(date +%s) - STARTED_AT ))
          echo "| Dependency setup ($route) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Build required workspace packages
        run: |
          started_at="$(date +%s)"
          yarn workspaces foreach -Rpt --from '@core/anti-virus' run package
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Workspace package build (@core/anti-virus) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Start ClamAV timing
        id: clamav-timing
        run: echo "cache-started-at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check ClamAV binary cache compatibility
        id: clamav-cache
        shell: bash
        run: |
          if [[ -f applications/core/anti-virus/build-inputs.env && -x applications/core/anti-virus/scripts/cache.sh ]]; then
            supported=true
          else
            supported=false
          fi
          echo "supported=$supported" >> "$GITHUB_OUTPUT"

      - name: Restore ClamAV binaries
        id: clamav-binaries
        if: steps.clamav-cache.outputs.supported == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ./applications/core/anti-virus/bin
          key: ${{ runner.os }}-${{ runner.arch }}-clamav-binaries-v3-${{ hashFiles('applications/core/anti-virus/build-inputs.env', 'applications/core/anti-virus/scripts/build.sh', 'applications/core/anti-virus/scripts/cache.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-clamav-binaries-v3-${{ hashFiles('applications/core/anti-virus/build-inputs.env', 'applications/core/anti-virus/scripts/build.sh', 'applications/core/anti-virus/scripts/cache.sh') }}-

      - name: Validate restored ClamAV binaries
        id: clamav-validation
        if: steps.clamav-cache.outputs.supported == 'true'
        env:
          CACHE_MATCHED_KEY: ${{ steps.clamav-binaries.outputs.cache-matched-key }}
          CACHE_STARTED_AT: ${{ steps.clamav-timing.outputs.cache-started-at }}
        run: |
          validation_started_at="$(date +%s)"
          restore_elapsed=$(( validation_started_at - CACHE_STARTED_AT ))
          if [[ -z "$CACHE_MATCHED_KEY" ]]; then
            cache_state="miss"
            valid=false
          elif applications/core/anti-virus/scripts/cache.sh validate; then
            cache_state="hit"
            valid=true
          else
            cache_state="invalid"
            valid=false
            rm -rf applications/core/anti-virus/bin
          fi
          validation_elapsed=$(( $(date +%s) - validation_started_at ))
          echo "valid=$valid" >> "$GITHUB_OUTPUT"
          echo "| ClamAV cache restore | ${restore_elapsed}s ($cache_state) |" >> "$RUNNER_TEMP/delivery-timing.md"
          echo "| ClamAV cache validation | ${validation_elapsed}s ($cache_state) |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Build ClamAV binaries
        env:
          CACHE_VALID: ${{ steps.clamav-validation.outputs.valid }}
        run: |
          started_at="$(date +%s)"
          yarn workspace @core/anti-virus predeploy
          elapsed_seconds=$(( $(date +%s) - started_at ))
          if [[ "$CACHE_VALID" == "true" ]]; then
            route="cache hit"
          else
            route="source build"
          fi
          echo "| ClamAV source build ($route) | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Save rebuilt ClamAV binaries
        if: steps.clamav-cache.outputs.supported == 'true' && steps.clamav-validation.outputs.valid != 'true'
        uses: actions/cache/save@v6
        with:
          path: ./applications/core/anti-virus/bin
          key: ${{ steps.clamav-binaries.outputs.cache-primary-key }}

      - name: Package anti-virus
        run: |
          started_at="$(date +%s)"
          yarn workspace @core/anti-virus exec serverless package --stage $STAGE --package "$RUNNER_TEMP/anti-virus-package"
          elapsed_seconds=$(( $(date +%s) - started_at ))
          echo "| Anti-virus packaging | ${elapsed_seconds}s |" >> "$RUNNER_TEMP/delivery-timing.md"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg ref "$DEPLOYMENT_REF" \
              --arg environment "$DEPLOYMENT_ENVIRONMENT" \
              --arg task "$DEPLOYMENT_TASK" \
              '{
                ref: $ref,
                environment: $environment,
                task: $task,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Create in-progress Deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state in_progress \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Deploy
        uses: nick-fields/retry@v4
        with:
          command: yarn workspace @core/anti-virus exec serverless deploy --stage $STAGE --package "$RUNNER_TEMP/anti-virus-package"
          max_attempts: 3
          retry_on: error
          timeout_minutes: 15

      - name: Record successful Deployment
        id: deployment-success
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state success \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -
          echo "recorded=true" >> "$GITHUB_OUTPUT"

      - name: Record failed Deployment
        if: failure() && steps.deployment.outputs.id != '' && steps.deployment-success.outputs.recorded != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state failure \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Record delivery timing summary
        if: always()
        shell: bash
        run: |
          if [[ -s "$RUNNER_TEMP/delivery-timing.md" ]]; then
            {
              echo "| Measurement | Duration |"
              echo "| --- | ---: |"
              cat "$RUNNER_TEMP/delivery-timing.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
  core-infrastructure:
    name: Deploy core infrastructure

    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'core-infrastructure')

    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      DEPLOYMENT_ENVIRONMENT: production
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@core/infrastructure'] }}
      DEPLOYMENT_TASK: deploy:core-infrastructure
      PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

