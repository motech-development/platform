# GENERATED FILE — DO NOT EDIT. Run `node .github/delivery/generate.mjs`.
name: Deploy to production

on:
  workflow_call:
    inputs:
      release-plan:
        required: true
        type: string

concurrency:
  group: production-environment
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      units: ${{ steps.plan.outputs.units }}

    permissions:
      contents: read
      deployments: read
      id-token: write

    env:
      ENVIRONMENT: production
      STAGE: production
      TARGET: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(inputs.release-plan).boundary }}

      - name: Configure AWS credentials for reconciliation
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Read expected cloud stacks
        shell: bash
        run: |
          aws cloudformation describe-stacks \
            --query 'Stacks[].StackName' \
            --output json \
            > "$RUNNER_TEMP/existing-stacks.json"

      - name: Read GitHub Deployments as Environment State
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          : > "$RUNNER_TEMP/deployments.jsonl"
          while IFS= read -r unit_id; do
            task="deploy:$unit_id"
            while IFS= read -r encoded_deployment; do
              deployment="$(printf '%s' "$encoded_deployment" | base64 --decode)"
              deployment_id="$(jq -r .id <<< "$deployment")"
              statuses="$(
                gh api \
                  "repos/${GITHUB_REPOSITORY}/deployments/$deployment_id/statuses?per_page=100" \
                  --jq '[.[] | {state}]'
              )"
              jq -c \
                --argjson statuses "$statuses" \
                '. + {statuses: $statuses} | {environment, task, ref, statuses}' \
                <<< "$deployment" \
                >> "$RUNNER_TEMP/deployments.jsonl"

            done < <(
              gh api -X GET "repos/${GITHUB_REPOSITORY}/deployments" \
                -f environment="$ENVIRONMENT" \
                -f task="$task" \
                -f per_page=1 \
                --jq '.[] | {id, environment, task, ref} | @base64'
            )
          done < <(
            jq -r \
              --arg target "$TARGET" \
              '.units[] | select(.targets | index($target)) | .id' \
              .github/delivery/catalog.json
          )
          jq -s '.' "$RUNNER_TEMP/deployments.jsonl" \
            > "$RUNNER_TEMP/deployments.json"

      - name: Create Reconciliation Plan
        id: plan
        env:
          DESIRED_TAGS: ${{ toJSON(fromJSON(inputs.release-plan).desiredTags) }}
        shell: bash
        run: |
          jq -n \
            --arg target "$TARGET" \
            --arg environment "$ENVIRONMENT" \
            --arg stage "$STAGE" \
            --argjson desiredTags "$DESIRED_TAGS" \
            --slurpfile deployments "$RUNNER_TEMP/deployments.json" \
            --slurpfile existingStacks "$RUNNER_TEMP/existing-stacks.json" \
            '{
              target: $target,
              environment: $environment,
              stage: $stage,
              desiredTags: $desiredTags,
              deployments: $deployments[0],
              existingStacks: $existingStacks[0]
            }' \
            > "$RUNNER_TEMP/reconciliation-input.json"
          plan="$(
            node .github/delivery/generate.mjs \
              --reconciliation-plan "$RUNNER_TEMP/reconciliation-input.json"
          )"
          echo "units=$(jq -c '.units | map(.id)' <<< "$plan")" \
            >> "$GITHUB_OUTPUT"

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore Node modules
        id: node-modules
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
          key: ${{ runner.os }}-modules-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Restore packages
        id: packages
        uses: actions/cache@v5
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: yarn install

      - name: Build packages
        if: steps.packages.outputs.cache-hit != 'true' || steps.node-modules.outputs.cache-hit != 'true'
        run: yarn package

  component-library:
    if: always() && contains(fromJSON(needs.setup.outputs.units || '[]'), 'component-library')
    runs-on: ubuntu-latest

    needs:
      - setup

    env:
      DEPLOYMENT_ENVIRONMENT: production
      DEPLOYMENT_REF: ${{ fromJSON(inputs.release-plan).desiredTags['@motech-development/breeze-ui'] }}
      DEPLOYMENT_TASK: deploy:component-library

    permissions:
      deployments: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(inputs.release-plan).desiredTags['@motech-development/breeze-ui'] }}
          fetch-depth: 0

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore Node modules
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
          key: ${{ runner.os }}-modules-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Restore packages
        uses: actions/cache@v5
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Build
        run: yarn workspace @motech-development/breeze-ui deploy

      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          deployment_id="$(
            jq -n \
              --arg ref "$DEPLOYMENT_REF" \
              --arg environment "$DEPLOYMENT_ENVIRONMENT" \
              --arg task "$DEPLOYMENT_TASK" \
              '{
                ref: $ref,
                environment: $environment,
                task: $task,
                auto_merge: false,
                required_contexts: []
              }' \
              | gh api --method POST "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq .id
          )"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Create in-progress Deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state in_progress \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/breeze-ui/storybook-static

      - name: Record Deployment result
        if: always() && steps.deployment.outputs.id != ''
        env:
          DEPLOYMENT_STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -n \
            --arg state "$DEPLOYMENT_STATE" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state: $state, log_url: $log_url, auto_inactive: false}' \
            | gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
              --input -

