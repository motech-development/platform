name: Release

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      boundary:
        description: Successfully released main commit SHA
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  release:
    name: Packages

    outputs:
      release-plan: ${{ steps.plan.outputs.release-plan }}

    runs-on: ubuntu-latest

    steps:
      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.boundary || github.sha }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Validate manual Release boundary
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BOUNDARY: ${{ inputs.boundary }}
        run: |
          boundary="$(git rev-parse --verify "$RELEASE_BOUNDARY^{commit}")"
          run_ids="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=push&status=completed&head_sha=$boundary&per_page=100" --jq '.workflow_runs[].id')"
          for run_id in $run_ids; do
            successful_jobs="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$run_id/jobs" --jq '[.jobs[] | select(.name == "Packages" and .conclusion == "success")] | length')"
            if [[ "$successful_jobs" -gt 0 ]]; then
              exit 0
            fi
          done
          echo "Main commit boundary $boundary has no successful Release job." >&2
          exit 1

      - name: Setup dependencies
        if: github.event_name == 'push'
        uses: ./.github/actions/setup-dependencies
        with:
          registry-url: https://registry.npmjs.org

      - name: Update npm to latest version
        if: github.event_name == 'push'
        run: npm install -g npm@latest

      - name: Build packages
        if: github.event_name == 'push'
        run: yarn package

      - name: Release
        if: github.event_name == 'push'
        run: yarn release
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Resolve published Releases
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -o pipefail
          git fetch --force --tags origin
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            | jq 'add | map({tag: .tag_name, draft: .draft, prerelease: .prerelease, publishedAt: .published_at})' \
            > "$RUNNER_TEMP/releases.json"

      - name: Create Release Plan
        id: plan
        env:
          RELEASE_BOUNDARY: ${{ github.event_name == 'workflow_dispatch' && inputs.boundary || github.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            plan="$(node .github/delivery/generate.mjs --release-plan "$RELEASE_BOUNDARY" full "$RUNNER_TEMP/releases.json")"
          else
            plan="$(node .github/delivery/generate.mjs --release-plan "$RELEASE_BOUNDARY" selective "$RUNNER_TEMP/releases.json")"
          fi
          echo "release-plan=$plan" >> "$GITHUB_OUTPUT"

  deploy-develop:
    name: Develop

    needs: release

    permissions:
      contents: read
      deployments: write
      id-token: write

    uses: ./.github/workflows/deploy-to-develop.yml
    with:
      release-plan: ${{ needs.release.outputs.release-plan }}
    secrets: inherit

  deploy-production:
    name: Production

    needs: release

    permissions:
      contents: write
      deployments: write
      id-token: write

    uses: ./.github/workflows/deploy-to-production.yml
    with:
      release-plan: ${{ needs.release.outputs.release-plan }}
    secrets: inherit
