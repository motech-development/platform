name: Deploy to environment

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  setup:
    name: Preview plan

    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    outputs:
      runtime-affected: ${{ steps.plan.outputs.runtime-affected }}
      units: ${{ steps.plan.outputs.units }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Detect runtime changes
        id: impact
        shell: bash
        run: |
          git diff --name-only '${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}' > "$RUNNER_TEMP/changed-files.txt"
          impact="$(node .github/delivery/generate.mjs --preview-impact "$RUNNER_TEMP/changed-files.txt")"
          echo "runtime-affected=$(jq -r '.runtimeAffected' <<< "$impact")" >> "$GITHUB_OUTPUT"
          echo "changed-workspaces=$(jq -c '.changedWorkspaces' <<< "$impact")" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: steps.impact.outputs.runtime-affected == 'true' && github.event.action == 'synchronize'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Read Preview Environment stacks
        if: steps.impact.outputs.runtime-affected == 'true' && github.event.action == 'synchronize'
        run: |
          aws cloudformation describe-stacks --query 'Stacks[].StackName' --output json > "$RUNNER_TEMP/existing-stacks.json"

      - name: Create Preview Plan
        id: plan
        env:
          CHANGED_WORKSPACES: ${{ steps.impact.outputs.changed-workspaces }}
          LIFECYCLE: ${{ github.event.action }}
          RUNTIME_AFFECTED: ${{ steps.impact.outputs.runtime-affected }}
          STAGE: pr-${{ github.event.pull_request.number }}
        shell: bash
        run: |
          existing_stacks='[]'
          if [[ -f "$RUNNER_TEMP/existing-stacks.json" ]]; then
            existing_stacks="$(cat "$RUNNER_TEMP/existing-stacks.json")"
          fi

          jq -n \
            --arg lifecycle "$LIFECYCLE" \
            --arg stage "$STAGE" \
            --argjson runtimeAffected "$RUNTIME_AFFECTED" \
            --argjson changedWorkspaces "$CHANGED_WORKSPACES" \
            --argjson existingStacks "$existing_stacks" \
            '{lifecycle: $lifecycle, stage: $stage, runtimeAffected: $runtimeAffected, changedWorkspaces: $changedWorkspaces, existingStacks: $existingStacks}' \
            > "$RUNNER_TEMP/preview-plan-input.json"

          plan="$(node .github/delivery/generate.mjs --preview-plan "$RUNNER_TEMP/preview-plan-input.json")"
          echo "runtime-affected=$RUNTIME_AFFECTED" >> "$GITHUB_OUTPUT"
          echo "units=$(jq -c '.units' <<< "$plan")" >> "$GITHUB_OUTPUT"
          echo "### Preview Plan" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$plan" | jq . >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate packages cache key
        if: steps.plan.outputs.runtime-affected == 'true'
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore Node modules
        if: steps.plan.outputs.runtime-affected == 'true'
        id: node-modules
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
          key: ${{ runner.os }}-modules-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Restore packages
        if: steps.plan.outputs.runtime-affected == 'true'
        id: packages
        uses: actions/cache@v5
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Install dependencies
        if: steps.plan.outputs.runtime-affected == 'true' && steps.node-modules.outputs.cache-hit != 'true'
        run: yarn

      - name: Build packages
        if: steps.plan.outputs.runtime-affected == 'true' && (steps.packages.outputs.cache-hit != 'true' || steps.node-modules.outputs.cache-hit != 'true')
        run: yarn package

