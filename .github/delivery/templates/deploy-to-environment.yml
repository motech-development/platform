        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/api deploy --stage $STAGE

      - name: Export env vars
        uses: xom9ikk/dotenv@v2
        with:
          path: ./applications/accounts/client
          mode: production

      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Publish URL
        uses: mshick/add-pr-comment@v3
        with:
          message-id: config
          message: |
            Add these params to your `.env.local` file

            ```
            REACT_APP_APPSYNC_URL="${{ env.REACT_APP_APPSYNC_URL }}"
            REACT_APP_AWS_REGION="${{ env.REACT_APP_AWS_REGION }}"
            ```
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

  # Preview status
  preview-status:
    name: Preview

    runs-on: ubuntu-latest

    needs:
      - setup
      - core-anti-virus
      - accounts-storage
      - accounts-data
      - accounts-warm-up
      - accounts-notifications
      - accounts-queue
      - accounts-reports
      - accounts-api

    if: always()

    steps:
      - name: Report planning failure
        if: needs.setup.result != 'success'
        run: exit 1

      - name: Preview deployment is not applicable
        if: needs.setup.outputs.runtime-affected == 'false'
        run: echo 'Preview deployment is not applicable for non-runtime changes.' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Preview Plan
        if: needs.setup.outputs.runtime-affected == 'true'
        env:
          NEEDS: ${{ toJSON(needs) }}
          UNITS: ${{ needs.setup.outputs.units }}
        run: |
          jq -n -e \
            --argjson needs "$NEEDS" \
            --argjson units "$UNITS" \
            '$units | map(select($needs[.] != null)) | all(. as $unit | $needs[$unit].result == "success")'

  # Accounts (client)
  accounts-client:
    name: Test accounts client

    runs-on: ubuntu-latest

    timeout-minutes: 60

    needs:
      - setup
      - preview-status

    if: always() && needs.setup.outputs.runtime-affected == 'true' && needs.preview-status.result == 'success'

    strategy:
      fail-fast: false
      matrix:
        containers:
          - 1
          - 2

    env:
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      REACT_APP_AUTH0_AUDIENCE: ${{ secrets.ACCOUNTS_APP_AUDIENCE }}
      REACT_APP_AUTH0_CLIENT_ID: ${{ secrets.ACCOUNTS_APP_CLIENT_ID_DEV }}
      REACT_APP_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_DEV }}
      REACT_APP_GA: ${{ secrets.GA_ACCOUNTS_DEV }}
      REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_CLIENT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      STAGE: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Generate packages cache key
        run: ./scripts/checksum.sh ./packages.txt packages

      - name: Restore Node modules
        uses: actions/cache@v5
        with:
          path: |
            ./node_modules
            ./applications/*/*/node_modules
            ./packages/*/node_modules
          key: ${{ runner.os }}-modules-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Restore packages
        uses: actions/cache@v5
        with:
          path: ./packages/*/lib
          key: ${{ runner.os }}-packages-v4-${{ hashFiles('**/packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Restore cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Restore env vars
        uses: actions/cache@v5
        with:
          path: ./applications/accounts/client/.env.production
          key: ${{ runner.os }}-accounts-client-env-vars-checks-v4-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-accounts-client-env-vars-checks-

      - name: Restore application cache
        uses: actions/cache@v5
        with:
          path: |
            ./applications/accounts/client/node_modules/.cache
            ./applications/accounts/client/.serverless
          key: ${{ runner.os }}-accounts-client-v4-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-accounts-client-v4-

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn workspace @accounts/client playwright install --with-deps

      - name: Build client
        run: yarn workspace @accounts/client build

      - name: Smoke tests
        run: yarn workspace @accounts/client e2e-ci --shard=${{ matrix.containers }}/2

  # Playwright status
  playwright-status:
    name: Set Playwright status

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-client

    if: always()

    steps:
      - name: Generate release token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Set commit status
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const runtimeAffected = '${{ needs.setup.outputs.runtime-affected }}' === 'true';
            const testsPassed = '${{ needs.accounts-client.result }}' === 'success';
            const status = !runtimeAffected || testsPassed ? 'success' : 'failure';
            const description = runtimeAffected
              ? (testsPassed ? 'Playwright tests passed' : 'Playwright tests failed')
              : 'Playwright is not applicable';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: status,
              context: 'Playwright',
              description: description
            });
