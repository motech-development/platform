    name: Setup

    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(inputs.release-plan).boundary }}

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

