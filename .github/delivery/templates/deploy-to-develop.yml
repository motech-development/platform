  # Anti virus
  anti-virus:
    name: Deploy anti virus

    runs-on: ubuntu-latest

    needs: setup

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: develop
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@core/anti-virus}}

      # {{fragment:anti-virus-cache}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        uses: nick-fields/retry@v4
        with:
          command: yarn workspace @core/anti-virus exec serverless deploy --stage $STAGE --package "$RUNNER_TEMP/anti-virus-package"
          max_attempts: 3
          retry_on: error
          timeout_minutes: 15

      - name: Update definitions
        run: yarn workspace @core/anti-virus update-definitions --stage $STAGE

  # Accounts (queue)
  accounts-queue:
    name: Deploy accounts queue

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-data

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: develop
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/queue}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/queue deploy --stage $STAGE

  # Accounts (storage)
  accounts-storage:
    name: Deploy accounts storage

    runs-on: ubuntu-latest

    needs:
