          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/reports deploy --stage $STAGE

  # Accounts (API)
  accounts-api:
    name: Deploy accounts API

    runs-on: ubuntu-latest

    outputs:
      appsync-url: ${{ steps.client-config.outputs.appsync-url }}
      aws-region: ${{ steps.client-config.outputs.aws-region }}

