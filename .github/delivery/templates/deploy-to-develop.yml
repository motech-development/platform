    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-data

    env:
      STAGE: develop
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

