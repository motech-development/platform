          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/data deploy --stage $STAGE

  deploy-accounts-warm-up:
    name: Deploy accounts warm up

    runs-on: ubuntu-latest

    needs: deploy-accounts-data

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/warm-up}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/warm-up deploy --stage $STAGE

  deploy-accounts-reports:
    name: Deploy accounts reports

    runs-on: ubuntu-latest

    needs:
      - deploy-accounts-data
      - deploy-accounts-notifications
      - deploy-accounts-storage

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/reports}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/reports deploy --stage $STAGE

  deploy-accounts-api:
    name: Deploy accounts API

    runs-on: ubuntu-latest

    outputs:
      appsync-url: ${{ steps.client-config.outputs.appsync-url }}
      aws-region: ${{ steps.client-config.outputs.aws-region }}

    needs:
      - deploy-accounts-data
      - deploy-accounts-queue
      - deploy-accounts-reports
      - deploy-accounts-storage

    env:
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_PROD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/api}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/api deploy --stage $STAGE

      # {{fragment:api-client-output}}

  deploy-accounts-infrastructure:
    name: Deploy accounts infrastructure

    runs-on: ubuntu-latest

    needs: deploy-infrastructure

    env:
      PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/infrastructure}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/infrastructure deploy --stage $STAGE

  deploy-accounts-notifications:
    name: Deploy accounts notifications

    runs-on: ubuntu-latest

    needs: deploy-accounts-data

    env:
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/notifications}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/notifications deploy --stage $STAGE

  build-accounts-client:
    name: Deploy accounts client

    runs-on: ubuntu-latest

    needs:
      - deploy-accounts-api
      - deploy-accounts-infrastructure

    env:
      PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
      REACT_APP_AUTH0_AUDIENCE: ${{ secrets.ACCOUNTS_APP_AUDIENCE }}
      REACT_APP_AUTH0_CLIENT_ID: ${{ secrets.ACCOUNTS_APP_CLIENT_ID_PROD }}
      REACT_APP_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_PROD }}
      REACT_APP_GA: ${{ secrets.GA_ACCOUNTS_PROD }}
      REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_CLIENT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      STAGE: production
      YARN_ENABLE_IMMUTABLE_INSTALLS: false

    environment:
      name: Accounts
      url: https://accounts.motechdevelopment.co.uk # TODO: Find a way to do this using env var or output

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/client}}

      # {{fragment:client-api-input}}

      - name: Build client
        run: yarn workspace @accounts/client build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Deploy
        run: yarn workspace @accounts/client deploy --stage $STAGE
