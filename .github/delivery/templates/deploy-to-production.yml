name: Deploy to production

on:
  workflow_call:
    inputs:
      release-plan:
        required: true
        type: string

concurrency: production_environment

jobs:
  setup:
    name: Setup

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(inputs.release-plan).boundary }}

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

  deploy-storybook:
    name: Deploy component library

    runs-on: ubuntu-latest

    needs: setup

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # {{fragment:dependency-steps:@motech-development/breeze-ui}}

      - name: Build
        run: yarn workspace @motech-development/breeze-ui deploy

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/breeze-ui/storybook-static

