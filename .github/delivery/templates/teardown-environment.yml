name: Teardown environment

on:
  pull_request:
    types:
      - closed

  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage, for example pr-123'
        required: true

concurrency:
  group: preview-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup

    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set Node version
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

  # Anti virus
  anti-virus:
    name: Teardown anti virus

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-storage

    env:
      AWS_DEFAULT_REGION: eu-west-1
      DEFINITIONS_BUCKET: s3://anti-virus-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}-definitions
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_CORE_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@core/anti-virus}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Clear bucket
        run: .github/delivery/empty-s3-bucket.sh "$DEFINITIONS_BUCKET"

      - name: Teardown
        run: yarn workspace @core/anti-virus teardown --stage $STAGE

  # Accounts (queue)
  accounts-queue:
    name: Teardown accounts queue

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-api

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/queue}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Teardown
        run: yarn workspace @accounts/queue teardown --stage $STAGE

  # Accounts (storage)
  accounts-storage:
    name: Teardown accounts storage

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-api
      - accounts-data
      - accounts-reports

    env:
      AWS_DEFAULT_REGION: eu-west-1
      DOWNLOAD_BUCKET: s3://accounts-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}-downloads
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}
      UPLOAD_BUCKET: s3://accounts-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}-uploads

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/storage}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Clear bucket
        run: |
          .github/delivery/empty-s3-bucket.sh "$DOWNLOAD_BUCKET"
          .github/delivery/empty-s3-bucket.sh "$UPLOAD_BUCKET"

      - name: Teardown
        run: yarn workspace @accounts/storage teardown --stage $STAGE

  # Accounts (data)
  accounts-data:
    name: Teardown accounts data

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-api
      - accounts-notifications
      - accounts-reports

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/data}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Teardown
        run: yarn workspace @accounts/data teardown --stage $STAGE

  # Accounts (notifications)
  accounts-notifications:
    name: Teardown accounts notifications

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-reports

    env:
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/notifications}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Teardown
        run: yarn workspace @accounts/notifications teardown --stage $STAGE

  # Accounts (reports)
  accounts-reports:
    name: Teardown accounts reports

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs:
      - setup
      - accounts-api

    env:
      AWS_DEFAULT_REGION: eu-west-1
      REPORTS_BUCKET: s3://accounts-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}-reports
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/reports}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Clear bucket
        run: .github/delivery/empty-s3-bucket.sh "$REPORTS_BUCKET"

      - name: Teardown
        run: yarn workspace @accounts/reports teardown --stage $STAGE

  # Accounts (API)
  accounts-api:
    name: Teardown accounts API

    if: github.actor != 'dependabot[bot]' && always()

    runs-on: ubuntu-latest

    needs: setup

    env:
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN_DEV }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_ACCOUNTS_BACKEND }}
      STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # {{fragment:dependency-steps:@accounts/api}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::633331859210:role/github-actions

      - name: Teardown
        run: yarn workspace @accounts/api teardown --stage $STAGE
